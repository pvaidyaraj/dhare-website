  <text x="600" y="27" text-anchor="middle" font-size="20" font-weight="bold" fill="white">How the Dhare Foundation Website is Built &amp; Maintained</text>
  <text x="600" y="50" text-anchor="middle" font-size="12" fill="#8899BB">From your idea to a live website — powered by 4 free or low-cost tools</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- BOX 1 — YOU + CLAUDE CODE                         -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="15" y="78" width="250" height="358" rx="12" fill="white" filter="url(#sh)"/>
  <rect x="15" y="78" width="250" height="40" rx="12" fill="#1565C0"/>
  <rect x="15" y="100" width="250" height="18" fill="#1565C0"/>
  <text x="140" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1  YOU + CLAUDE CODE</text>

  <!-- Person icon (moved up 14px) -->
  <circle cx="78" cy="158" r="28" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <circle cx="78" cy="145" r="11" fill="#1565C0"/>
