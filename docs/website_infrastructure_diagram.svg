  <text x="672" y="312" text-anchor="middle" font-size="10" fill="#444">publishes it online — live</text>
  <text x="672" y="330" text-anchor="middle" font-size="9" fill="#888">No manual uploads.</text>
  <text x="672" y="345" text-anchor="middle" font-size="9" fill="#888">No server management.</text>
  <text x="672" y="368" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">dharefoundation.org</text>
  <text x="672" y="383" text-anchor="middle" font-size="9" fill="#888">Goes live in seconds</text>

