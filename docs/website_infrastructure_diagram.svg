  <text x="417" y="315" text-anchor="middle" font-size="10" fill="#444">but for code</text>
  <text x="417" y="333" text-anchor="middle" font-size="9" fill="#888">Undo any mistake.</text>
  <text x="417" y="348" text-anchor="middle" font-size="9" fill="#888">See full change history.</text>
  <text x="417" y="370" text-anchor="middle" font-size="9" fill="#0969DA">github.com/pvaidyaraj/</text>
  <text x="417" y="385" text-anchor="middle" font-size="9" fill="#0969DA">dhare-website</text>

