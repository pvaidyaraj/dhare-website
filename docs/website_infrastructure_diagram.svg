  <circle cx="417" cy="185" r="52" fill="#24292E"/>
  <circle cx="417" cy="175" r="20" fill="white"/>
  <circle cx="410" cy="170" r="4" fill="#24292E"/>
  <circle cx="424" cy="170" r="4" fill="#24292E"/>
  <path d="M409 183 Q417 189 425 183" stroke="#24292E" stroke-width="2" fill="none"/>
  <path d="M397 187 Q389 199 397 207" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M437 187 Q445 199 437 207" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M406 203 Q406 213 414 213" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
