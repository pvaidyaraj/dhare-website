  <text x="78" y="215" text-anchor="middle" font-size="9" fill="#666">NGO Manager</text>

  <!-- Arrow You to Claude -->
  <line x1="107" y1="156" x2="133" y2="156" stroke="#1565C0" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="120" y="150" text-anchor="middle" font-size="8" fill="#555">tells</text>

  <!-- Claude Code box (moved up 14px) -->
  <rect x="136" y="134" width="108" height="68" rx="8" fill="#1A1A2E"/>
  <text x="190" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#FF6B35">Claude</text>
  <text x="190" y="176" text-anchor="middle" font-size="12" fill="white">Code</text>
  <text x="190" y="193" text-anchor="middle" font-size="9" fill="#AAA">AI writes code</text>

  <text x="140" y="230" text-anchor="middle" font-size="9" fill="#444">You describe changes in</text>
  <text x="140" y="243" text-anchor="middle" font-size="9" fill="#444">plain English. Claude writes</text>
  <text x="140" y="256" text-anchor="middle" font-size="9" fill="#444">the actual code for you.</text>

  <line x1="30" y1="268" x2="250" y2="268" stroke="#EEE" stroke-width="1"/>

