  <text x="614" y="540" text-anchor="middle" font-size="10" fill="#444">- Volunteer sign-up forms</text>
  <text x="614" y="558" text-anchor="middle" font-size="10" fill="#444">- Contact messages</text>
  <text x="614" y="576" text-anchor="middle" font-size="10" fill="#444">- Submitted data from visitors</text>
