  <text x="930" y="540" text-anchor="middle" font-size="10" fill="#444">- Free for small websites</text>
  <text x="930" y="558" text-anchor="middle" font-size="10" fill="#444">- Secure and always backed up</text>
  <text x="930" y="576" text-anchor="middle" font-size="10" fill="#444">- View data from any browser</text>
  <text x="930" y="594" text-anchor="middle" font-size="10" fill="#444">- No technical skill to access</text>

