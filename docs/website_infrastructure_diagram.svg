  <rect x="48" y="286" width="170" height="76" rx="4" fill="#0D1117"/>
  <rect x="56" y="295" width="88" height="5" rx="2" fill="#4CAF50"/>
  <rect x="56" y="306" width="124" height="4" rx="2" fill="#FF6B35"/>
  <rect x="56" y="317" width="104" height="4" rx="2" fill="#4CAF50"/>
  <rect x="56" y="328" width="70" height="4" rx="2" fill="#58A6FF"/>
  <rect x="56" y="339" width="114" height="4" rx="2" fill="#FF6B35"/>
